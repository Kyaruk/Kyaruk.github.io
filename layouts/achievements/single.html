{{ define "main" }}
<article class="pub-detail">
  <a class="back-link" href="{{ "/achievements/" | relURL }}">
    <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    <span data-i18n="back_to_achievements">返回成果</span>
  </a>

  <h1 class="pub-detail-title">{{ .Title }}</h1>
  <p class="pub-detail-authors">{{ .Params.authors | markdownify }}</p>
  <p class="pub-detail-venue">{{ .Params.venue }}</p>

  <h2 class="pub-detail-section-title" data-i18n="abstract_label">摘要</h2>
  <div class="pub-detail-abstract">
    <img class="pub-detail-image" src="{{ .Params.image }}" alt="pipeline figure" onerror="this.style.display='none'">
    {{ .Content }}
  </div>

  <div class="pub-detail-links">
    {{ if .Params.pdf }}<a class="btn" href="{{ .Params.pdf }}" target="_blank" rel="noopener">PDF</a>{{ end }}
    {{ if .Params.code }}<a class="btn" href="{{ .Params.code }}" target="_blank" rel="noopener">Code</a>{{ end }}
  </div>
</article>
{{ end }}
