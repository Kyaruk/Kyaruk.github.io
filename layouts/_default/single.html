{{ define "hero" }}
<section class="hero" style="background-image:url('{{ "assets/hero.jpg" | relURL }}')">
  <div class="hero-overlay">
    <h1 class="hero-title">{{ .Title }}</h1>
    <p class="hero-subtitle">{{ .Date.Format "2006-01-02" }}{{ with .Params.tags }} · {{ delimit . ", " }}{{ end }}</p>
  </div>
</section>
{{ end }}

{{ define "main" }}
  <article class="post">
    <div class="post-body">{{ .Content }}</div>
  </article>
{{ end }}
